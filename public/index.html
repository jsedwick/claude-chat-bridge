<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Claude Chat Bridge</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <!-- Session Sidebar -->
  <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h2>Sessions</h2>
      <button id="new-chat-btn" class="btn-new-chat" onclick="createNewSession()">+ New Chat</button>
    </div>
    <div id="session-list" class="session-list"></div>
  </aside>

  <!-- Main Chat Area -->
  <main class="chat-main">
    <header class="chat-header">
      <button class="btn-menu" onclick="toggleSidebar()" aria-label="Menu">&#9776;</button>
      <button id="mode-toggle" class="mode-toggle mode-work" onclick="toggleMode()" title="Switch mode">Work</button>
      <h1 id="chat-title" class="chat-title" onclick="renameCurrentSession()">Claude Chat Bridge</h1>
      <select id="model-select" class="model-select" onchange="saveModel(this.value)">
        <option value="opus">Opus</option>
        <option value="sonnet">Sonnet</option>
      </select>
    </header>

    <div id="messages" class="messages">
      <div id="welcome" class="welcome-message">
        <h2>Claude Chat Bridge</h2>
        <p>Chat with Claude + your Obsidian vault from any device.</p>
        <div class="welcome-dir-picker">
          <label for="dir-select">Working directory:</label>
          <select id="dir-select" class="dir-select"></select>
        </div>
        <button class="btn-new-chat btn-welcome" onclick="createNewSession()">Start a New Chat</button>
      </div>
    </div>

    <div id="input-area" class="input-area" style="display: none;">
      <div id="token-counter" class="token-counter" style="display:none">
        <span id="token-count">0k</span> / <span id="token-limit">200k</span>
      </div>
      <div class="input-container">
        <input type="file" id="image-input" accept="image/*" multiple hidden onchange="handleImageSelect(this)">
        <button class="btn-attach" onclick="document.getElementById('image-input').click()" aria-label="Attach image">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </button>
        <textarea
          id="message-input"
          class="message-input"
          placeholder="Type a message..."
          rows="1"
          onkeydown="handleKeydown(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button id="send-btn" class="btn-send" onclick="sendMessage()" aria-label="Send">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
        <button id="stop-btn" class="btn-stop" onclick="cancelStream()" aria-label="Stop" style="display:none">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <rect x="6" y="6" width="12" height="12" rx="2"/>
          </svg>
        </button>
      </div>
    </div>
  </main>

  <!-- Permission Request Dialog -->
  <div id="permission-overlay" class="permission-overlay" style="display:none">
    <div class="permission-dialog">
      <div class="permission-header">Permission Request</div>
      <div class="permission-body">
        <div class="permission-tool" id="permission-tool-name"></div>
        <div class="permission-detail" id="permission-tool-detail"></div>
      </div>
      <div class="permission-actions">
        <button class="permission-btn permission-btn-deny" onclick="respondPermission('deny')">Deny</button>
        <button class="permission-btn permission-btn-allow-all" onclick="respondPermission('allow', true)">Allow All</button>
        <button class="permission-btn permission-btn-allow" onclick="respondPermission('allow')">Allow</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
