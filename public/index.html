<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Claude Chat Bridge</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/css/all.min.css">
  <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
</head>
<body>
  <!-- Session Sidebar -->
  <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-view-switcher">
        <button class="sidebar-view-toggle" onclick="toggleViewMenu()">
          <span id="sidebar-view-label">Sessions</span>
          <svg class="sidebar-view-chevron" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div id="sidebar-view-menu" class="sidebar-view-menu" style="display:none">
          <button class="sidebar-view-option active" data-view="sessions" onclick="switchView('sessions')">Sessions</button>
          <button class="sidebar-view-option" data-view="kb" onclick="switchView('kb')">Knowledge Base</button>
          <button class="sidebar-view-option" data-view="settings" onclick="switchView('settings')">Settings</button>
        </div>
      </div>
      <div id="sessions-toolbar" class="sidebar-new-chat">
        <div class="sidebar-dir-wrapper">
          <button class="btn-sidebar-dir" onclick="toggleSidebarDirPicker()" aria-label="Select working directory">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
          </button>
          <div id="sidebar-dir-picker" class="sidebar-dir-picker" style="display:none"></div>
        </div>
        <button id="new-chat-btn" class="btn-new-chat" disabled onclick="createNewSession()">+ New Chat</button>
      </div>
    </div>
    <!-- Sessions view -->
    <div id="sessions-view">
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="work" onclick="setMode('work')">Work</button>
        <button class="mode-tab" data-mode="personal" onclick="setMode('personal')">Personal</button>
      </div>
      <div id="session-list" class="session-list"></div>
      <div class="archive-section">
        <button class="archive-toggle" onclick="toggleArchiveSection()">
          <svg class="archive-chevron" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
          <span>Archived</span>
          <span id="archive-count" class="archive-count">0</span>
        </button>
        <div id="archive-list" class="archive-list" style="display: none;"></div>
      </div>
    </div>
    <!-- KB Browser view (sidebar file tree) -->
    <div id="kb-view" class="kb-sidebar" style="display:none">
      <div class="kb-sidebar-toolbar">
        <button id="kb-toolbar-bookmarks" class="kb-toolbar-btn" onclick="toggleKbBookmarksView()" aria-label="Show bookmarks" title="Bookmarks">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
          </svg>
        </button>
        <button id="kb-toolbar-recent" class="kb-toolbar-btn" onclick="toggleKbRecentView()" aria-label="Recently updated files" title="Recent files">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </button>
        <button id="kb-toolbar-collapse" class="kb-toolbar-btn" onclick="collapseAllKbDirs()" aria-label="Collapse all folders" title="Collapse all">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 14 10 14 10 20"/>
            <polyline points="20 10 14 10 14 4"/>
            <line x1="14" y1="10" x2="21" y2="3"/>
            <line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
        </button>
      </div>
      <div class="kb-search-wrap">
        <svg class="kb-search-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="kb-search" type="text" class="kb-search-input" placeholder="Search documents…" autocomplete="off" spellcheck="false" />
        <svg id="kb-search-clear" class="kb-search-clear" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
      <div id="kb-tree" class="kb-tree"></div>
      <div id="kb-search-results" class="kb-search-results" style="display:none"></div>
      <div id="kb-bookmarks-list" class="kb-bookmarks-list" style="display:none"></div>
      <div id="kb-recent-list" class="kb-recent-list" style="display:none"></div>
    </div>
    <!-- Settings view (sidebar nav) -->
    <div id="settings-view" class="settings-nav" style="display:none">
      <button class="settings-nav-item active" data-section="appearance" onclick="showSettingsSection('appearance')">Appearance</button>
      <button class="settings-nav-item" data-section="voice" onclick="showSettingsSection('voice')">Voice</button>
      <button class="settings-nav-item" data-section="paths" onclick="showSettingsSection('paths')">Paths</button>
      <button class="settings-nav-item" data-section="vault-setup" onclick="showSettingsSection('vault-setup')">Vault Setup</button>
      <button class="settings-nav-item" data-section="allowed-paths" onclick="showSettingsSection('allowed-paths')">Allowed Paths</button>
      <button class="settings-nav-item" data-section="updates" onclick="showSettingsSection('updates')">Updates</button>
    </div>
  </aside>

  <!-- Main Chat Area -->
  <main class="chat-main">
    <header class="chat-header">
      <button class="btn-menu" onclick="toggleSidebar()" aria-label="Menu">&#9776;</button>
      <div class="dir-picker-wrapper" style="display:none">
        <button class="btn-dir" onclick="toggleDirPicker()" aria-label="Change working directory">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
        </button>
        <div id="dir-picker" class="dir-picker" style="display:none"></div>
      </div>
      <div class="title-menu-wrapper">
        <h1 id="chat-title" class="chat-title" onclick="showTitleMenu(event)">Claude Chat Bridge</h1>
        <div id="title-menu" class="title-menu" style="display:none">
          <button class="title-menu-item" onclick="titleMenuRename()">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
            Rename Session
          </button>
          <button class="title-menu-item" onclick="toggleSessionDetails()">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            View Session Details
          </button>
        </div>
      </div>
      <select id="model-select" class="model-select" onchange="saveModel(this.value)">
        <option value="opus">Opus</option>
        <option value="sonnet">Sonnet</option>
      </select>
    </header>

    <!-- Session details panel -->
    <div id="session-details-panel" class="session-details-panel" style="display:none">
      <div class="session-details-sections">
        <div class="session-details-section">
          <div class="session-details-section-header" onclick="this.parentElement.classList.toggle('expanded')">
            <span class="session-details-chevron">&#9654;</span>
            <span>Vault Documents</span>
            <span id="vault-docs-count" class="session-details-count"></span>
          </div>
          <div id="vault-docs-list" class="session-details-list"></div>
        </div>
        <div class="session-details-section">
          <div class="session-details-section-header" onclick="this.parentElement.classList.toggle('expanded')">
            <span class="session-details-chevron">&#9654;</span>
            <span>Code Files</span>
            <span id="code-files-count" class="session-details-count"></span>
          </div>
          <div id="code-files-list" class="session-details-list"></div>
        </div>
        <div id="handoff-section" class="session-details-section" style="display:none">
          <div class="session-details-section-header" onclick="this.parentElement.classList.toggle('expanded')">
            <span class="session-details-chevron">&#9654;</span>
            <span>Handoff Notes</span>
            <button id="handoff-edit-btn" class="handoff-edit-btn" onclick="event.stopPropagation(); toggleHandoffEdit()">Edit</button>
          </div>
          <div id="handoff-content" class="session-details-list">
            <div id="handoff-display" class="handoff-display"></div>
            <div id="handoff-editor" class="handoff-editor" style="display:none">
              <textarea id="handoff-textarea" class="handoff-textarea" rows="6"></textarea>
              <div class="handoff-editor-actions">
                <button class="handoff-save-btn" onclick="saveHandoff()">Save</button>
                <button class="handoff-cancel-btn" onclick="cancelHandoffEdit()">Cancel</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="messages" class="messages">
      <div id="tts-face-overlay" class="tts-face-overlay">
        <svg class="tts-face-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <!-- Glow ring -->
          <circle class="tts-face-glow" cx="100" cy="100" r="90"/>
          <!-- Head -->
          <circle class="tts-face-head" cx="100" cy="100" r="80"/>
          <!-- Eyebrows -->
          <path class="tts-face-brow" d="M62 72 Q72 65, 82 72"/>
          <path class="tts-face-brow" d="M118 72 Q128 65, 138 72"/>
          <!-- Eyes (grouped for blink) -->
          <g class="tts-face-eye-group">
            <ellipse class="tts-face-eye" cx="75" cy="85" rx="6" ry="7"/>
            <ellipse class="tts-face-eye" cx="125" cy="85" rx="6" ry="7"/>
          </g>
          <!-- Mouth (animated via JS) -->
          <path id="tts-face-mouth" class="tts-face-mouth" d="M75 125 Q100 135, 125 125"/>
        </svg>
      </div>
      <div id="welcome" class="welcome-message">
        <div class="welcome-tabs">
          <button class="welcome-tab active" data-tab="sessions" onclick="switchWelcomeTab('sessions')">Sessions</button>
          <button class="welcome-tab" data-tab="topics" onclick="switchWelcomeTab('topics')">Topics</button>
        </div>
        <div id="welcome-sessions" class="welcome-sessions welcome-tab-content active"></div>
        <div id="welcome-topics" class="welcome-topics welcome-tab-content" style="display:none"></div>
      </div>
    </div>

    <div id="input-area" class="input-area" style="display: none;">
      <div id="reference-preview" class="reference-preview" style="display: none;">
        <div class="reference-preview-label">Re:</div>
        <div id="reference-preview-text" class="reference-preview-text"></div>
        <button class="reference-preview-close" onclick="clearReference()" aria-label="Remove reference">&times;</button>
      </div>
      <div class="input-container">
        <input type="file" id="image-input" accept="image/*" multiple hidden onchange="handleImageSelect(this)">
        <div class="action-menu-wrapper">
          <button class="btn-attach" aria-label="Actions menu">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
          <div id="action-menu" class="action-menu" style="display: none;"></div>
        </div>
        <textarea
          id="message-input"
          class="message-input"
          placeholder="Type a message..."
          rows="1"
          onkeydown="handleKeydown(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button id="send-btn" class="btn-send" onclick="sendMessage()" aria-label="Send">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
        <button id="stop-btn" class="btn-stop" onclick="cancelStream()" aria-label="Stop" style="display:none">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <rect x="6" y="6" width="12" height="12" rx="2"/>
          </svg>
        </button>
        <button id="tts-toggle-btn" class="btn-tts-toggle" onclick="toggleAutoSpeak()" title="Auto-speak OFF (click to enable)" aria-label="Toggle auto-speak">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          </svg>
        </button>
        <button id="tts-stop-btn" class="btn-tts-stop" onclick="stopSpeaking()" title="Stop speaking" aria-label="Stop speaking" style="display:none">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <line x1="23" y1="9" x2="17" y2="15"/>
            <line x1="17" y1="9" x2="23" y2="15"/>
          </svg>
        </button>
      </div>
    </div>
  </main>

  <!-- Settings Panel (replaces chat content when in settings view) -->
  <div id="settings-panel" class="settings-panel" style="display:none">
    <header class="chat-header">
      <button class="btn-menu" onclick="toggleSidebar()" aria-label="Menu">&#9776;</button>
      <h1 class="chat-title" style="cursor:default">Settings</h1>
    </header>
    <div id="settings-content" class="settings-content"></div>
  </div>

  <!-- KB Browser Panel (replaces chat content when in KB view) -->
  <div id="kb-panel" class="kb-panel" style="display:none">
    <header class="chat-header">
      <button class="btn-menu" onclick="toggleSidebar()" aria-label="Menu">&#9776;</button>
      <button id="kb-bookmark-toggle" class="kb-action-btn kb-bookmark-toggle" style="display:none" onclick="toggleKbBookmark()" aria-label="Bookmark">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
      </button>
      <h1 id="kb-title" class="chat-title" style="cursor:default" ondblclick="renameCurrentKbFile()">Knowledge Base</h1>
      <div class="kb-header-actions">
        <button id="kb-diff-btn" class="kb-action-btn" style="display:none" onclick="toggleKbDiff()" aria-label="Diff">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v18"/>
            <path d="M3 12h4"/>
            <path d="M17 12h4"/>
            <path d="M17 6h4"/>
            <path d="M3 18h4"/>
          </svg>
        </button>
        <button id="kb-edit-btn" class="kb-action-btn" style="display:none" onclick="toggleKbEdit()" aria-label="Edit">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
        <button id="kb-save-btn" class="kb-action-btn kb-save-btn" style="display:none" onclick="saveKbFile()" aria-label="Save">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </button>
        <button id="kb-cancel-btn" class="kb-action-btn" style="display:none" onclick="cancelKbEdit()" aria-label="Cancel">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </header>
    <div id="kb-content" class="kb-content">
      <div id="kb-welcome" class="welcome-message">
        <div class="welcome-tabs">
          <button class="welcome-tab active" data-tab="kb-sessions" onclick="switchKbWelcomeTab('sessions')">Sessions</button>
          <button class="welcome-tab" data-tab="kb-topics" onclick="switchKbWelcomeTab('topics')">Topics</button>
        </div>
        <div id="kb-welcome-sessions" class="welcome-sessions welcome-tab-content active"></div>
        <div id="kb-welcome-topics" class="welcome-topics welcome-tab-content" style="display:none"></div>
      </div>
      <div id="kb-action-bar" class="kb-action-bar" style="display:none">
        <div class="kb-action-bar-left">
          <button id="kb-back-btn" class="kb-back-btn" style="display:none" onclick="navigateKbBack()" aria-label="Back">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19" y1="12" x2="5" y2="12"/>
              <polyline points="12 19 5 12 12 5"/>
            </svg>
            <span>Back</span>
          </button>
        </div>
        <div class="kb-action-bar-right">
          <div id="kb-continue-session-wrapper" style="display:none">
            <button id="kb-continue-session-btn" class="kb-continue-session-btn" onclick="continueFromSession()" aria-label="Continue Session">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5 3 19 12 5 21 5 3"/>
              </svg>
              <span>Continue Session</span>
            </button>
          </div>
          <div id="kb-start-from-topic-wrapper" style="display:none">
            <button id="kb-start-from-topic-btn" class="kb-continue-session-btn" onclick="startFromTopic()" aria-label="Start Session from Topic">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5 3 19 12 5 21 5 3"/>
              </svg>
              <span>Start Session from Topic</span>
            </button>
          </div>
        </div>
      </div>
      <div id="kb-rendered" class="kb-rendered" style="display:none"></div>
      <div id="kb-diff" class="kb-diff" style="display:none"></div>
      <div id="kb-frontmatter-editor" class="kb-frontmatter-editor" style="display:none">
        <div class="kb-fm-header" onclick="toggleFrontmatterPanel()">
          <svg class="kb-fm-chevron" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
          <span class="kb-fm-label">Frontmatter</span>
        </div>
        <div class="kb-fm-body">
          <textarea id="kb-frontmatter-textarea" spellcheck="false" placeholder="key: value"></textarea>
        </div>
      </div>
      <div id="kb-editor" class="kb-editor" style="display:none"></div>
    </div>
  </div>

  <!-- App Persona Modal -->
  <div id="persona-overlay" class="persona-overlay" style="display:none">
    <div class="persona-dialog">
      <div class="persona-header">App Settings</div>
      <div class="persona-body">
        <label class="persona-label" for="persona-title-input">App Title</label>
        <input type="text" id="persona-title-input" class="persona-input" placeholder="Claude Chat Bridge" />
        <label class="persona-label" for="persona-textarea">Persona <span class="persona-hint">(saved to ~/.claude/CLAUDE.md)</span></label>
        <textarea id="persona-textarea" class="persona-textarea" placeholder="You are [Name], a [personality trait] who [core behavior].&#10;You frequently [key habit] and [key habit].&#10;You work these into your responses naturally — [vivid example].&#10;You're confident in [domain] and not afraid to [action].&#10;&#10;Avoid: [what not to do].&#10;&#10;Goal: [desired outcome — the kind of assistant you want]."></textarea>
      </div>
      <div class="persona-actions">
        <button class="persona-btn persona-btn-cancel" onclick="closePersonaModal()">Cancel</button>
        <button class="persona-btn persona-btn-save" onclick="savePersonaModal()">Save</button>
      </div>
    </div>
  </div>

  <!-- Permission Request Dialog -->
  <div id="permission-overlay" class="permission-overlay" style="display:none">
    <div class="permission-dialog">
      <div class="permission-header">Permission Request</div>
      <div class="permission-body">
        <div class="permission-tool" id="permission-tool-name"></div>
        <div class="permission-detail" id="permission-tool-detail"></div>
      </div>
      <div class="permission-actions">
        <button class="permission-btn permission-btn-deny" onclick="respondPermission('deny')">Deny</button>
        <button class="permission-btn permission-btn-allow-all" onclick="respondPermission('allow', true)">Allow All</button>
        <button class="permission-btn permission-btn-allow" onclick="respondPermission('allow')">Allow</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
